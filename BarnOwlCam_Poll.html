<style>
html, body { height: auto; overflow-y: auto; -webkit-overflow-scrolling: touch; }
* { box-sizing: border-box; }
body{font-family:'Segoe UI', Tahoma, sans-serif; background:#f0f2f5; padding:10px; margin:0; color:#333; min-height: 100vh;}
.container{width:100%; max-width:1000px; margin:auto; background:white; padding:15px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1);}
h1{text-align:center; color:#2e7d32; font-size:1.6em; margin-bottom:5px;}
.subtitle{text-align:center; color:#666; font-size:1em; margin-bottom:20px; font-weight:bold;}
.poll-grid{display:grid; grid-template-columns: 1fr; gap:12px;}
@media (min-width: 768px) { .poll-grid { grid-template-columns: 1fr 1fr; } h1 { font-size: 2em; } }
.entry{background:#fafafa; padding:12px; border-radius:10px; border:1px solid #eee;}
.name-row{display:flex; justify-content:space-between; align-items:center; font-weight:bold; font-size: 1.1em;}
.bar-bg{background:#e0e0e0; height:12px; border-radius:6px; overflow:hidden; margin-top: 8px;}
.bar-fill{height:100%; border-radius:6px; transition:width 0.5s ease-out;}
.winner-banner{background:#4caf50; color:white; padding:15px; border-radius:10px; text-align:center; font-size:1.5em; font-weight:bold; margin-bottom:20px; animation: pulse 2s infinite;}
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
