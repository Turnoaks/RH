<!DOCTYPE html><html><head><meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<style>
* { box-sizing: border-box; }
body{font-family:'Segoe UI', Tahoma, sans-serif; background:#f0f2f5; padding:10px; margin:0; color:#333;}
.container{width:100%; max-width:1000px; margin:auto; background:white; padding:15px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1);}
h1{text-align:center; color:#2e7d32; margin-top:0; font-size:1.6em;}
.poll-grid{display:grid; grid-template-columns: 1fr; gap:15px; margin-top:15px;}
@media (min-width: 768px) {
  .poll-grid { grid-template-columns: 1fr 1fr; }
  .container { padding: 30px; border-radius: 20px; }
  h1 { font-size: 2.2em; }
}
.entry{background:#fafafa; padding:12px; border-radius:10px; border:1px solid #eee; overflow:hidden;}
.label-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; font-weight:bold;}
.name-tag{display:flex; align-items:center; gap:6px; font-size:1em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.votes-count{color:#666; font-size:0.85em; flex-shrink:0;}
.bar-bg{background:#e0e0e0; height:10px; border-radius:5px; overflow:hidden;}
.bar-fill{height:100%; border-radius:5px; transition:width 1s ease-in-out;}
.rank-badge{background:#2e7d32; color:white; padding:1px 6px; border-radius:10px; font-size:0.65em; margin-left:5px; text-transform:uppercase;}
.footer{margin-top:30px; text-align:center; padding-top:15px; border-top:1px solid #eee; color:#666; font-size:0.9em;}
.closed-banner{background:#d32f2f; color:white; padding:12px; border-radius:8px; font-weight:bold; margin-top:15px;}
